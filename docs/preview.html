<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supply Chain Control Tower - Preview</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f1f5f9; color: #0f172a; }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
      .card { background: #fff; border: 1px solid #cbd5e1; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
      h1 { margin: 0 0 8px; }
      p { margin: 6px 0; color: #475569; }
      a { color: #0369a1; text-decoration: none; }
      a:hover { text-decoration: underline; }
      iframe { width: 100%; height: 980px; border: 1px solid #cbd5e1; border-radius: 10px; background: #fff; }
      .pill { display: inline-block; margin: 4px 6px 0 0; padding: 6px 10px; border-radius: 999px; background: #e2e8f0; font-size: 12px; color: #0f172a; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Supply Chain Control Tower Preview</h1>
        <p>If Next.js preview is unavailable in your environment, this page provides a direct static preview of the app blueprint.</p>
        <p><strong>Primary image:</strong> <a href="./inventory-blueprint.svg" target="_blank">inventory-blueprint.svg</a></p>
        <div>
          <span class="pill">Items</span>
          <span class="pill">Transactions</span>
          <span class="pill">Purchase Orders</span>
          <span class="pill">Serial Traceability</span>
          <span class="pill">Control Tower Dashboard</span>
        </div>
      </div>

      <iframe src="./inventory-blueprint.svg" title="Inventory Management App Blueprint"></iframe>
    </div>
  </body>
</html>
