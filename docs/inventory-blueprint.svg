<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <rect width="1500" height="980" fill="#f1f5f9"/>
  <text x="40" y="70" font-family="Arial" font-size="48" font-weight="700" fill="#0f172a">Inventory Management App Blueprint</text>
  <text x="42" y="108" font-family="Arial" font-size="22" fill="#475569">Control Tower Inventory | Data integrity first, dashboards second</text>

  <rect x="40" y="130" width="1420" height="70" rx="10" fill="#1e293b"/>
  <text x="62" y="172" font-family="Arial" font-size="24" font-weight="700" fill="#e2e8f0">Version 1 Anchors: Items • Transactions • Purchase Orders • Serials</text>

  <g font-family="Arial" font-size="24" font-weight="700" fill="#0e7490">
    <rect x="40" y="220" width="330" height="56" rx="10" fill="#ecfeff" stroke="#7dd3fc" stroke-width="2"/><text x="168" y="255" text-anchor="middle">Items</text>
    <rect x="395" y="220" width="330" height="56" rx="10" fill="#ecfeff" stroke="#7dd3fc" stroke-width="2"/><text x="560" y="255" text-anchor="middle">Transactions</text>
    <rect x="750" y="220" width="330" height="56" rx="10" fill="#ecfeff" stroke="#7dd3fc" stroke-width="2"/><text x="915" y="255" text-anchor="middle">Purchase Orders</text>
    <rect x="1105" y="220" width="330" height="56" rx="10" fill="#ecfeff" stroke="#7dd3fc" stroke-width="2"/><text x="1270" y="255" text-anchor="middle">Serial Traceability</text>
  </g>

  <g font-family="Arial" fill="#0f172a">
    <g transform="translate(40,300)"><rect width="680" height="145" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="16" y="30" font-size="24" font-weight="700">Dashboard / Control Tower</text><text x="24" y="62" font-size="19" fill="#475569">• KPI cards</text><text x="24" y="90" font-size="19" fill="#475569">• Top risk items and late POs</text><text x="24" y="118" font-size="19" fill="#475569">• Shipments at risk and project issues</text></g>
    <g transform="translate(760,300)"><rect width="680" height="145" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="16" y="30" font-size="24" font-weight="700">Inventory Master</text><text x="24" y="62" font-size="19" fill="#475569">• Item attributes and preferred vendors</text><text x="24" y="90" font-size="19" fill="#475569">• Reorder + days-cover calculations</text><text x="24" y="118" font-size="19" fill="#475569">• Criticality and risk tagging</text></g>
    <g transform="translate(40,470)"><rect width="680" height="145" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="16" y="30" font-size="24" font-weight="700">Transactions Engine</text><text x="24" y="62" font-size="19" fill="#475569">• Receive / Issue / Transfer / Adjust</text><text x="24" y="90" font-size="19" fill="#475569">• Immutable movement history</text><text x="24" y="118" font-size="19" fill="#475569">• On-hand derived from transactions</text></g>
    <g transform="translate(760,470)"><rect width="680" height="145" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="16" y="30" font-size="24" font-weight="700">Serial Traceability</text><text x="24" y="62" font-size="19" fill="#475569">• Chain of custody by serial number</text><text x="24" y="90" font-size="19" fill="#475569">• Project/work-order assignment</text><text x="24" y="118" font-size="19" fill="#475569">• Shipped/delivered lifecycle</text></g>
    <g transform="translate(40,640)"><rect width="680" height="145" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="16" y="30" font-size="24" font-weight="700">Projects + Purchasing + Shipping</text><text x="24" y="62" font-size="19" fill="#475569">• Required vs issued materials and shortages</text><text x="24" y="90" font-size="19" fill="#475569">• PO lateness + receipt linkage</text><text x="24" y="118" font-size="19" fill="#475569">• Shipment status and freight quote logic</text></g>
    <g transform="translate(760,640)"><rect width="680" height="145" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="16" y="30" font-size="24" font-weight="700">Controls + Next Steps</text><text x="24" y="62" font-size="19" fill="#475569">• Roles/permissions by function</text><text x="24" y="90" font-size="19" fill="#475569">• Import master data and open transactions</text><text x="24" y="118" font-size="19" fill="#475569">• Build dashboards from clean transactional data</text></g>
  </g>
</svg>
